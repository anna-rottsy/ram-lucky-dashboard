<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Patrick's Magic | Gold Finder</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --gold: #f1c40f;
            --dark-bg: #0f2027;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ecf0f1;
            --magic-glow: 0 0 20px rgba(46, 204, 113, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Magical Particles */
        .background-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .clover, .gold-coin, .sparkle {
            position: absolute;
            animation: fall linear infinite;
        }

        .clover { color: rgba(46, 204, 113, 0.15); font-size: 2rem; }
        .gold-coin { color: rgba(241, 196, 15, 0.2); font-size: 1.5rem; }
        .sparkle { color: rgba(255, 255, 255, 0.6); font-size: 1rem; animation: sparkle-fall 8s linear infinite; }

        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
        @keyframes sparkle-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            background: linear-gradient(to right, var(--primary-green), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
            margin-bottom: 0.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.5)); }
            to { filter: drop-shadow(0 0 30px rgba(241, 196, 15, 0.8)); }
        }

        .subtitle {
            color: #bdc3c7;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .country-info {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
            animation: pulse 2s infinite;
            max-width: 90%;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(241, 196, 15, 0.5); }
            50% { box-shadow: 0 0 20px rgba(241, 196, 15, 0.8); }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-green);
            box-shadow: 0 12px 40px rgba(46, 204, 113, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gold);
            font-weight: 600;
        }

        /* Autocomplete Styles */
        .autocomplete-wrapper {
            position: relative;
            width: 100%;
        }

        #country-input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #country-input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .autocomplete-items {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(15, 32, 39, 0.98);
            border: 1px solid var(--primary-green);
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            margin-top: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .autocomplete-items.active {
            display: block;
        }

        .autocomplete-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .autocomplete-item:hover {
            background: rgba(46, 204, 113, 0.2);
            padding-left: 20px;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item .distance {
            font-size: 0.8rem;
            color: var(--gold);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .checkbox-wrapper:hover {
            border-color: var(--primary-green);
            background: rgba(46, 204, 113, 0.1);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #444;
            border-radius: 25px;
            transition: 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        input[type="checkbox"]:checked + .toggle-switch {
            background: var(--primary-green);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }

        input[type="checkbox"]:checked + .toggle-switch::after {
            transform: translateX(24px);
        }

        input[type="checkbox"] { display: none; }

        .btn-calc {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, var(--dark-green), var(--primary-green));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-calc::before {
            content: '✨';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            animation: twinkle 1.5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.5; transform: translateY(-50%) scale(1.2); }
        }

        .btn-calc:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(46, 204, 113, 0.7);
        }

        .results-section {
            display: none;
            animation: fadeInUp 0.8s ease;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }

        .kpi-card {
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--gold);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.8);
        }

        .kpi-label {
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-top: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .magic-message {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(241, 196, 15, 0.1);
            border-left: 4px solid var(--gold);
            border-radius: 10px;
            font-style: italic;
            animation: slideIn 0.5s ease;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--gold);
            border-right: 5px solid var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Moving Hat Styles */
        .leprechaun-hat {
            position: fixed;
            font-size: 4rem;
            z-index: 100;
            cursor: pointer;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .distance-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(46, 204, 113, 0.2);
            border-radius: 15px;
            font-size: 0.85rem;
            margin-top: 5px;
            border: 1px solid var(--primary-green);
        }

        .selected-country {
            display: none;
            margin-top: 10px;
            padding: 8px 15px;
            background: rgba(46, 204, 113, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--primary-green);
        }

        .selected-country.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="background-fx" id="bg-fx"></div>
    
    <!-- Шляпа -->
    <div class="leprechaun-hat" id="magicHat" onclick="surprise()" title="Click me!">🎩</div>

    <div class="container">
        <header>
            <h1><i class="fas fa-shamrock"></i> Leprechaun AI</h1>
            <p class="subtitle">Gold Detection System</p>
            <div class="country-info" id="countryDisplay">
                <i class="fas fa-map-marker-alt"></i> 
                <span>Select your country below</span>
            </div>
        </header>

        <div class="dashboard-grid">
            
            <div class="card">
                <h2 style="margin-bottom: 1.5rem; color: var(--primary-green);">
                    <i class="fas fa-sliders-h"></i> Search Parameters
                </h2>
                
                <form id="magicForm">
                    <div class="form-group">
                        <label>Location (Country)</label>
                        <div class="autocomplete-wrapper">
                            <input type="text" id="country-input" placeholder="Start typing country name..." autocomplete="off">
                            <div class="autocomplete-items" id="autocomplete-list"></div>
                        </div>
                        <input type="hidden" id="selected-country-code">
                        <div class="selected-country" id="selected-country-display"></div>
                    </div>

                    <div class="form-group">
                        <label>Atmospheric Conditions</label>
                        <label class="checkbox-wrapper">
                            <span>Rainbow Visible?</span>
                            <input type="checkbox" id="rainbow">
                            <div class="toggle-switch"></div>
                        </label>
                    </div>

                    <div class="form-group">
                        <label>Belief in Magic Level</label>
                        <input type="range" id="faith" min="1" max="100" value="50" style="width:100%; accent-color: var(--gold);">
                        <div style="text-align: right; font-size: 0.8rem; color: #888;">
                            Current: <span id="faithVal">50</span>%
                        </div>
                    </div>

                    <button type="button" class="btn-calc" onclick="calculateMagic()">
                        Calculate Chance
                    </button>
                </form>
            </div>

            <div class="card results-section" id="results">
                <h2 style="margin-bottom: 1.5rem; color: var(--gold);">
                    <i class="fas fa-chart-line"></i> Luck Analytics
                </h2>
                
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px; color: var(--primary-green);">
                        Connecting to leprechauns...
                    </p>
                </div>

                <div id="content">
                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-value" id="kpi-gold">0%</div>
                            <div class="kpi-label">Gold Chance</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value" id="kpi-luck">0</div>
                            <div class="kpi-label">Luck Index</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value" id="kpi-leprechaun" style="font-size: 1.5rem;">Low</div>
                            <div class="kpi-label">Leprechaun Activity</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="magicChart"></canvas>
                    </div>

                    <div class="magic-message" id="magicText">
                        <span>Waiting for data...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

        let myChart = null;
        let selectedCountry = null;

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🍀 Page loaded!');
            initAutocomplete();
            createMagicalEffects();
            moveHat();
            setInterval(moveHat, 6000);
            
            // Обновление значения ползунка
            document.getElementById('faith').addEventListener('input', function(e) {
                document.getElementById('faithVal').textContent = e.target.value;
            });
        });

        // Автокомплит для стран
        function initAutocomplete() {
            const input = document.getElementById('country-input');
            const list = document.getElementById('autocomplete-list');
            
            if (!input || !list) {
                console.error('Autocomplete elements not found!');
                return;
            }

            input.addEventListener('input', function() {
                const val = this.value.toLowerCase();
                list.innerHTML = '';
                
                if (!val) {
                    list.classList.remove('active');
                    return;
                }

                const filtered = countries.filter(c => 
                    c.name.toLowerCase().includes(val)
                ).slice(0, 10); // Показываем топ 10

                if (filtered.length === 0) {
                    list.classList.remove('active');
                    return;
                }

                filtered.forEach(country => {
                    const item = document.createElement('div');
                    item.classList.add('autocomplete-item');
                    
                    const distanceText = country.distance === 0 
                        ? '🍀 Home' 
                        : `${country.distance} km`;
                    
                    item.innerHTML = `
                        <span>${country.name}</span>
                        <span class="distance">${distanceText}</span>
                    `;
                    
                    item.addEventListener('click', function() {
                        selectCountry(country);
                    });
                    
                    list.appendChild(item);
                });

                list.classList.add('active');
            });

            // Закрыть список при клике вне
            document.addEventListener('click', function(e) {
                if (e.target !== input) {
                    list.classList.remove('active');
                }
            });

            // Закрыть при выборе
            input.addEventListener('blur', function() {
                setTimeout(() => {
                    list.classList.remove('active');
                }, 200);
            });
        }

        function selectCountry(country) {
            selectedCountry = country;
            document.getElementById('country-input').value = country.name;
            document.getElementById('selected-country-code').value = country.code;
            
            const display = document.getElementById('selected-country-display');
            const distText = country.distance === 0 
                ? "🍀 You're home!" 
                : `${country.distance} km from Ireland`;
            
            display.textContent = `Selected: ${country.name} (${distText})`;
            display.classList.add('show');
            
            document.getElementById('autocomplete-list').classList.remove('active');
            
            // Обновить инфо в шапке
            const countryDisplay = document.getElementById('countryDisplay');
            countryDisplay.innerHTML = `
                <i class="fas fa-map-marker-alt"></i> 
                ${country.name} 
                <span class="distance-badge">${distText}</span>
            `;
            
            console.log('✅ Country selected:', country.name);
        }

        function createMagicalEffects() {
            const container = document.getElementById('bg-fx');
            for(let i = 0; i < 15; i++) createFallingElement(container, 'clover', '🍀');
            for(let i = 0; i < 8; i++) createFallingElement(container, 'gold-coin', '🪙');
            for(let i = 0; i < 20; i++) createFallingElement(container, 'sparkle', '✨');
        }

        function createFallingElement(container, className, content) {
            const el = document.createElement('div');
            el.classList.add(className);
            el.textContent = content;
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 10 + 8) + 's';
            el.style.animationDelay = Math.random() * 5 + 's';
            el.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
            el.style.opacity = Math.random() * 0.5 + 0.1;
            container.appendChild(el);
        }

        function calculateMagic() {
            if (!selectedCountry) {
                alert('⚠️ Please select a country first!');
                return;
            }

            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            
            resultsDiv.style.display = 'block';
            content.style.opacity = '0.3';
            loader.style.display = 'block';

            setTimeout(function() {
                loader.style.display = 'none';
                content.style.opacity = '1';
                runCalculation();
            }, 2000);
        }

        function runCalculation() {
            const hasRainbow = document.getElementById('rainbow').checked;
            const faith = parseInt(document.getElementById('faith').value);
            const countryData = selectedCountry;

            let goldChance = 15;
            
            if (countryData.distance === 0) goldChance += 45;
            else if (countryData.distance < 1000) goldChance += 30;
            else if (countryData.distance < 3000) goldChance += 20;
            else if (countryData.distance < 6000) goldChance += 10;
            else goldChance += 5;
            
            if (hasRainbow) goldChance += 30;
            goldChance += (faith / 4);
            goldChance += Math.random() * 10;
            
            if (goldChance > 100) goldChance = 99.9;

            animateValue("kpi-gold", 0, Math.floor(goldChance), 1500, "%");
            animateValue("kpi-luck", 0, Math.floor(Math.random() * 50 + goldChance), 1500, "");
            
            let activity = 'Low';
            if (goldChance > 40) activity = 'Medium';
            if (goldChance > 70) activity = 'High';
            if (goldChance > 90) activity = 'CRITICAL! 🍀';
            
            document.getElementById('kpi-leprechaun').textContent = activity;

            const messages = {
                high: "<strong>AMAZING!</strong> The stars align perfectly! Wear green, follow the rainbow, and listen for jig music. Gold is near!",
                medium: "Good vibes detected! Your chances are decent. Look for four-leaf clovers and keep your eyes on the horizon.",
                low: "The magic is weak today. Try increasing your belief or planning a trip to Ireland. Every journey starts with a dream!"
            };
            
            const msgBox = document.getElementById('magicText');
            let msgKey = 'low';
            if (goldChance > 70) msgKey = 'high';
            else if (goldChance > 40) msgKey = 'medium';
            
            msgBox.innerHTML = messages[msgKey];
            msgBox.style.borderColor = goldChance > 70 ? '#2ecc71' : (goldChance > 40 ? '#f1c40f' : '#e74c3c');

            if (goldChance > 85) launchConfetti();
            
            updateChart(goldChance, hasRainbow ? 85 : 25, faith, countryData.distance);
        }

        function animateValue(id, start, end, duration, suffix) {
            const obj = document.getElementById(id);
            if (!obj) return;
            
            let startTimestamp = null;
            const step = function(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function updateChart(gold, rainbow, faith, distance) {
            const canvas = document.getElementById('magicChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            
            if (myChart) {
                myChart.destroy();
            }

            const proximity = Math.max(0, 100 - (distance / 200));
            
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Gold Probability', 'Rainbow Quality', 'Belief Level', 'Leprechaun Proximity', 'Magic Field'],
                    datasets: [{
                        label: 'Luck Indicators',
                        data: [gold, rainbow, faith, proximity, Math.random() * 40 + 30],
                        backgroundColor: 'rgba(46, 204, 113, 0.4)',
                        borderColor: '#2ecc71',
                        pointBackgroundColor: '#f1c40f',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#f1c40f',
                        borderWidth: 3,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)', lineWidth: 1 },
                            grid: { color: 'rgba(255,255,255,0.15)' },
                            pointLabels: { 
                                color: '#ecf0f1', 
                                font: { size: 11, family: 'Montserrat' },
                                padding: 10
                            },
                            ticks: { 
                                display: true, 
                                backdropColor: 'transparent',
                                color: 'rgba(255,255,255,0.5)',
                                stepSize: 25
                            },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { color: '#ecf0f1', font: { family: 'Montserrat' } }
                        }
                    },
                    animation: {
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        function launchConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#2ecc71', '#f1c40f', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#2ecc71', '#f1c40f', '#ffffff']
                });

                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function surprise() {
            const msgs = ["Top o' the morning!", "Luck be with you!", "Find that gold!", "Sláinte!"];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            alert('🎩 ' + msg + ' 🍀');
            launchConfetti();
        }

        // Логика движения шляпы
        function moveHat() {
            const hat = document.getElementById('magicHat');
            if (!hat) return;
            
            const corners = [
                { top: '20px', left: '20px', right: 'auto', bottom: 'auto' },
                { top: '20px', left: 'auto', right: '20px', bottom: 'auto' },
                { top: 'auto', left: '20px', right: 'auto', bottom: '20px' },
                { top: 'auto', left: 'auto', right: '20px', bottom: '20px' }
            ];
            
            const randomCorner = corners[Math.floor(Math.random() * corners.length)];
            Object.assign(hat.style, randomCorner);
            
            const rotate = Math.random() > 0.5 ? 'rotate(10deg)' : 'rotate(-10deg)';
            hat.style.transform = rotate;
        }
    </script>
</body>
</html>
