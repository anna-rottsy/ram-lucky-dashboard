    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --gold: #f1c40f;
            --dark-bg: #0f2027;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ecf0f1;
            --magic-glow: 0 0 20px rgba(46, 204, 113, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Language Switcher */
        .lang-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 5px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .lang-btn.active {
            background: var(--primary-green);
            color: #fff;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        .lang-btn:hover:not(.active) {
            background: rgba(255,255,255,0.1);
        }

        /* Magical Particles */
        .background-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .clover, .gold-coin, .sparkle {
            position: absolute;
            animation: fall linear infinite;
        }

        .clover { color: rgba(46, 204, 113, 0.15); font-size: 2rem; }
        .gold-coin { color: rgba(241, 196, 15, 0.2); font-size: 1.5rem; }
        .sparkle { color: rgba(255, 255, 255, 0.6); font-size: 1rem; animation: sparkle-fall 8s linear infinite; }

        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
        @keyframes sparkle-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            background: linear-gradient(to right, var(--primary-green), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
            margin-bottom: 0.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.5)); }
            to { filter: drop-shadow(0 0 30px rgba(241, 196, 15, 0.8)); }
        }

        .subtitle {
            color: #bdc3c7;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .country-info {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
            animation: pulse 2s infinite;
            max-width: 90%;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(241, 196, 15, 0.5); }
            50% { box-shadow: 0 0 20px rgba(241, 196, 15, 0.8); }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-green);
            box-shadow: 0 12px 40px rgba(46, 204, 113, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gold);
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
            cursor: pointer;
            appearance: none; /* Убираем стандартную стрелку */
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%232ecc71%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }

        select:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .checkbox-wrapper:hover {
            border-color: var(--primary-green);
            background: rgba(46, 204, 113, 0.1);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #444;
            border-radius: 25px;
            transition: 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        input[type="checkbox"]:checked + .toggle-switch {
            background: var(--primary-green);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }

        input[type="checkbox"]:checked + .toggle-switch::after {
            transform: translateX(24px);
        }

        input[type="checkbox"] { display: none; }

        .btn-calc {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, var(--dark-green), var(--primary-green));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-calc::before {
            content: '✨';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            animation: twinkle 1.5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.5; transform: translateY(-50%) scale(1.2); }
        }

        .btn-calc:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(46, 204, 113, 0.7);
        }

        .results-section {
            display: none;
            animation: fadeInUp 0.8s ease;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }

        .kpi-card {
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--gold);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.8);
        }

        .kpi-label {
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-top: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .magic-message {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(241, 196, 15, 0.1);
            border-left: 4px solid var(--gold);
            border-radius: 10px;
            font-style: italic;
            animation: slideIn 0.5s ease;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--gold);
            border-right: 5px solid var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Moving Hat Styles */
        .leprechaun-hat {
            position: fixed;
            font-size: 4rem;
            z-index: 100;
            cursor: pointer;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .distance-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(46, 204, 113, 0.2);
            border-radius: 15px;
            font-size: 0.85rem;
            margin-top: 5px;
            border: 1px solid var(--primary-green);
        }
    </style>
</head>

        let currentLang = 'en';
        let myChart = null;

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            populateCountries();
            createMagicalEffects();
            updateCountryInfo();
            moveHat(); // Запуск движения шляпы
            setInterval(moveHat, 6000); // Движение каждые 6 секунд
        });

        function populateCountries() {
            const select = document.getElementById('country');
            // Сортировка по алфавиту
            countries.sort((a, b) => a.name.localeCompare(b.name)).forEach(country => {
                const option = document.createElement('option');
                option.value = country.code;
                const distText = country.distance === 0 
                    ? (currentLang === 'en' ? '🍀 Home' : '🍀 Дом') 
                    : `${country.distance} km`;
                option.textContent = `${country.name} (${distText})`;
                select.appendChild(option);
            });
        }

        function createMagicalEffects() {
            const container = document.getElementById('bg-fx');
            for(let i = 0; i < 15; i++) createFallingElement(container, 'clover', '🍀');
            for(let i = 0; i < 8; i++) createFallingElement(container, 'gold-coin', '🪙');
            for(let i = 0; i < 20; i++) createFallingElement(container, 'sparkle', '✨');
        }

        function createFallingElement(container, className, content) {
            const el = document.createElement('div');
            el.classList.add(className);
            el.textContent = content;
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 10 + 8) + 's';
            el.style.animationDelay = Math.random() * 5 + 's';
            el.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
            el.style.opacity = Math.random() * 0.5 + 0.1;
            container.appendChild(el);
        }

        function updateCountryInfo() {
            const code = document.getElementById('country').value;
            const country = countries.find(c => c.code === code);
            const display = document.getElementById('countryDisplay');
            
            if (country) {
                const isHome = country.distance === 0;
                const distText = isHome
                    ? (currentLang === 'en' ? "🍀 You're home!" : "🍀 Вы дома!")
                    : (currentLang === 'en' 
                        ? `${country.distance} km from Ireland` 
                        : `${country.distance} км от Ирландии`);
                
                display.innerHTML = `
                    <i class="fas fa-map-marker-alt"></i> 
                    ${country.name} 
                    <span class="distance-badge">${distText}</span>
                `;
            }
        }

        // Исправленная функция смены языка
        function setLanguage(lang) {
            currentLang = lang;
            
            // Обновляем кнопки
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            
            // Обновляем текст
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            
            // Обновляем информацию о стране и график (если есть)
            updateCountryInfo();
            populateCountries(); // Пересоздать список с новым языком
            
            if (document.getElementById('results').style.display === 'block') {
                runCalculation();
            }
        }

        function calculateMagic() {
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            
            resultsDiv.style.display = 'block';
            content.style.opacity = '0.3';
            loader.style.display = 'block';

            setTimeout(() => {
                loader.style.display = 'none';
                content.style.opacity = '1';
                runCalculation();
            }, 2000);
        }

        function runCalculation() {
            const country = document.getElementById('country').value;
            const hasRainbow = document.getElementById('rainbow').checked;
            const faith = parseInt(document.getElementById('faith').value);
            const countryData = countries.find(c => c.code === country);

            let goldChance = 15;
            
            if (countryData.distance === 0) goldChance += 45;
            else if (countryData.distance < 1000) goldChance += 30;
            else if (countryData.distance < 3000) goldChance += 20;
            else if (countryData.distance < 6000) goldChance += 10;
            else goldChance += 5;
            
            if (hasRainbow) goldChance += 30;
            goldChance += (faith / 4);
            goldChance += Math.random() * 10;
            
            if (goldChance > 100) goldChance = 99.9;

            animateValue("kpi-gold", 0, Math.floor(goldChance), 1500, "%");
            animateValue("kpi-luck", 0, Math.floor(Math.random() * 50 + goldChance), 1500, "");
            
            let activity = currentLang === 'en' ? 'Low';
            if (goldChance > 40) activity = currentLang === 'en' ? 'Medium' : 'Средняя';
            if (goldChance > 70) activity = currentLang === 'en' ? 'High' : 'Высокая';
            if (goldChance > 90) activity = currentLang === 'en' ? 'CRITICAL! ' : 'КРИТИЧЕСКАЯ! 🍀';
            
            document.getElementById('kpi-leprechaun').textContent = activity;

            const messages = {
                en: {
                    high: "<strong>AMAZING!</strong> The stars align perfectly! Wear green, follow the rainbow, and listen for jig music. Gold is near!",
                    medium: "Good vibes detected! Your chances are decent. Look for four-leaf clovers and keep your eyes on the horizon.",
                    low: "The magic is weak today. Try increasing your belief or planning a trip to Ireland. Every journey starts with a dream!"
                },
                ru: {
                    high: "<strong>УДИВИТЕЛЬНО!</strong> Звезды сошлись! Наденьте зеленое, следуйте за радугой и прислушайтесь к ирландской музыке. Золото близко!",
                    medium: "Хорошая энергетика! Ваши шансы неплохие. Ищите четырехлистный клевер и следите за горизонтом.",
                    low: "Магия сегодня слаба. Попробуйте увеличить веру в чудеса или спланируйте поездку в Ирландию. Каждое путешествие начинается с мечты!"
                }
            };
            
            const msgBox = document.getElementById('magicText');
            let msgKey = 'low';
            if (goldChance > 70) msgKey = 'high';
            else if (goldChance > 40) msgKey = 'medium';
            
            msgBox.innerHTML = messages[currentLang][msgKey];
            msgBox.style.borderColor = goldChance > 70 ? '#2ecc71' : (goldChance > 40 ? '#f1c40f' : '#e74c3c');

            if (goldChance > 85) launchConfetti();
            
            updateChart(goldChance, hasRainbow ? 85 : 25, faith, countryData.distance);
        }

        function animateValue(id, start, end, duration, suffix) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + suffix;
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function updateChart(gold, rainbow, faith, distance) {
            const ctx = document.getElementById('magicChart').getContext('2d');
            
            if (myChart) myChart.destroy();

            const labels = currentLang === 'en' 
                ? ['Gold Probability', 'Rainbow Quality', 'Belief Level', 'Leprechaun Proximity', 'Magic Field']
                : ['Вероятность золота', 'Качество радуги', 'Уровень веры', 'Близость лепрекона', 'Магическое поле'];

            const proximity = Math.max(0, 100 - (distance / 200));
            
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: currentLang === 'en' ? 'Luck Indicators' : 'Показатели удачи',
                        data: [gold, rainbow, faith, proximity, Math.random() * 40 + 30],
                        backgroundColor: 'rgba(46, 204, 113, 0.4)',
                        borderColor: '#2ecc71',
                        pointBackgroundColor: '#f1c40f',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#f1c40f',
                        borderWidth: 3,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)', lineWidth: 1 },
                            grid: { color: 'rgba(255,255,255,0.15)' },
                            pointLabels: { 
                                color: '#ecf0f1', 
                                font: { size: 11, family: 'Montserrat' },
                                padding: 10
                            },
                            ticks: { 
                                display: true, 
                                backdropColor: 'transparent',
                                color: 'rgba(255,255,255,0.5)',
                                stepSize: 25
                            },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { color: '#ecf0f1', font: { family: 'Montserrat' } }
                        }
                    },
                    animation: {
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        function launchConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#2ecc71', '#f1c40f', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#2ecc71', '#f1c40f', '#ffffff']
                });

                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function surprise() {
            const surprises = {
                en: ["Top o' the morning!", "Luck be with you!", "Find that gold!", "Sláinte!"],
                ru: ["Доброго утра!", "Удачи тебе!", "Найди золото!", "Слава Ирландии!"]
            };
            
            const msgs = surprises[currentLang];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            
            alert('🎩 ' + msg + ' 🍀');
            launchConfetti();
        }

        // Логика движения шляпы
        function moveHat() {
            const hat = document.getElementById('magicHat');
            const corners = [
                { top: '20px', left: '20px', right: 'auto', bottom: 'auto' }, // Top Left
                { top: '20px', left: 'auto', right: '20px', bottom: 'auto' }, // Top Right
                { top: 'auto', left: '20px', right: 'auto', bottom: '20px' }, // Bottom Left
                { top: 'auto', left: 'auto', right: '20px', bottom: '20px' }  // Bottom Right
            ];
            
            const randomCorner = corners[Math.floor(Math.random() * corners.length)];
            
            // Применяем стили
            Object.assign(hat.style, randomCorner);
            
            // Небольшой поворот для живости
            const rotate = Math.random() > 0.5 ? 'rotate(10deg)' : 'rotate(-10deg)';
            hat.style.transform = rotate;
        }
